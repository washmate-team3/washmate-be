spring.datasource.url=jdbc:h2:mem:washmate_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.sql.init.mode=never

washmate.security.jwt.secret=test-secret-for-context-loads-change-me-123456789
washmate.security.jwt.access-token-minutes=60
washmate.security.jwt.refresh-token-days=7
washmate.security.otp.mock-code=123456
washmate.security.otp.expose-mock-code=true
washmate.security.otp.ttl-minutes=5
washmate.security.otp.max-attempts=5
washmate.security.otp.resend-cooldown-seconds=60
washmate.security.otp.sender=log
washmate.security.login.max-failed-attempts=5
washmate.security.login.lock-minutes=15
washmate.security.docs-enabled=true
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

spring.flyway.enabled=false
app.mail.from=test@washmate.local
