# ============================================================
# Profile: supabase
# KHONG hardcode credential lam default trong file nay.
# Gia tri that dat trong .env (gitignore) hoac env variables.
# App se fail-fast khi thieu bien bat buoc.
# ============================================================

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=false
spring.flyway.locations=classpath:db/migration

washmate.security.jwt.secret=${JWT_SECRET}
washmate.security.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}
washmate.loyalty.rollback.enabled=${LOYALTY_ROLLBACK_ENABLED:false}
washmate.supabase.url=${SUPABASE_URL:}
washmate.supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY:}
washmate.supabase.storage.avatar-bucket=${SUPABASE_AVATAR_BUCKET:avatars}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# VNPAY: khi enabled=true ma thieu tmn-code/hash-secret thi app fail-fast luc startup
washmate.payment.vnpay.enabled=${VNPAY_ENABLED:true}
washmate.payment.vnpay.tmn-code=${VNPAY_TMN_CODE:}
washmate.payment.vnpay.hash-secret=${VNPAY_HASH_SECRET:}

spring.mail.host=${MAIL_HOST:smtp.resend.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:resend}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
