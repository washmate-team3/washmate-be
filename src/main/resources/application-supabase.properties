spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=false
spring.flyway.locations=classpath:db/migration
washmate.database.migration-runner.enabled=false

washmate.security.jwt.secret=${JWT_SECRET}
washmate.security.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS}
washmate.loyalty.rollback.enabled=${LOYALTY_ROLLBACK_ENABLED:false}

washmate.payment.vnpay.enabled=${VNPAY_ENABLED:false}
washmate.payment.vnpay.tmn-code=${VNPAY_TMN_CODE:}
washmate.payment.vnpay.hash-secret=${VNPAY_HASH_SECRET:}

spring.mail.host=${MAIL_HOST:smtp.resend.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
