spring.datasource.url=jdbc:h2:mem:washmate_local;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data-local.sql
spring.flyway.enabled=false

washmate.security.jwt.secret=local-secret-for-dev-only-change-before-prod-123456789
washmate.security.jwt.access-token-minutes=60
washmate.security.jwt.refresh-token-days=7
washmate.security.otp.mock-code=
washmate.security.otp.expose-mock-code=true
washmate.security.otp.ttl-minutes=5
washmate.security.otp.max-attempts=5
washmate.security.otp.resend-cooldown-seconds=60
washmate.security.otp.sender=log
washmate.security.login.max-failed-attempts=5
washmate.security.login.lock-minutes=15
washmate.security.oauth2.google.client-id=${GOOGLE_CLIENT_ID:}
washmate.security.docs-enabled=true
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
washmate.upload.avatar-dir=${AVATAR_UPLOAD_DIR:uploads/avatars}
washmate.supabase.url=${SUPABASE_URL:}
washmate.supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY:}
washmate.supabase.storage.avatar-bucket=${SUPABASE_AVATAR_BUCKET:avatars}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Local test: cho phep return URL settle payment thay IPN (IPN khong toi duoc localhost)
washmate.payment.vnpay.return-fallback-enabled=true
