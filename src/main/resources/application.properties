spring.application.name=car-wash-management

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

washmate.security.jwt.secret=${JWT_SECRET}
washmate.security.jwt.access-token-minutes=${JWT_ACCESS_TOKEN_MINUTES:60}
washmate.security.jwt.refresh-token-days=${JWT_REFRESH_TOKEN_DAYS:7}
washmate.security.otp.mock-code=${OTP_MOCK_CODE:}
washmate.security.otp.expose-mock-code=${OTP_EXPOSE_MOCK_CODE:false}
washmate.security.otp.ttl-minutes=${OTP_TTL_MINUTES:5}
washmate.security.otp.max-attempts=${OTP_MAX_ATTEMPTS:5}
washmate.security.otp.resend-cooldown-seconds=${OTP_RESEND_COOLDOWN_SECONDS:60}
washmate.security.otp.sender=${OTP_SENDER:log}
washmate.security.otp.mail.from=${OTP_MAIL_FROM:no-reply@washmate.local}
washmate.security.otp.mail.subject=${OTP_MAIL_SUBJECT:Your WashMate OTP code}
washmate.security.login.max-failed-attempts=${LOGIN_MAX_FAILED_ATTEMPTS:5}
washmate.security.login.lock-minutes=${LOGIN_LOCK_MINUTES:15}
washmate.security.oauth2.google.client-id=${GOOGLE_CLIENT_ID:}
washmate.security.docs-enabled=${DOCS_ENABLED:false}
springdoc.api-docs.enabled=${DOCS_ENABLED:false}
springdoc.swagger-ui.enabled=${DOCS_ENABLED:false}
washmate.upload.avatar-dir=${AVATAR_UPLOAD_DIR:uploads/avatars}
washmate.supabase.url=${SUPABASE_URL:}
washmate.supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY:}
washmate.supabase.storage.avatar-bucket=${SUPABASE_AVATAR_BUCKET:avatars}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

washmate.payment.vnpay.enabled=${VNPAY_ENABLED:true}
washmate.payment.vnpay.tmn-code=${VNPAY_TMN_CODE}
washmate.payment.vnpay.hash-secret=${VNPAY_HASH_SECRET}
washmate.payment.vnpay.pay-url=${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
washmate.payment.vnpay.return-url=${VNPAY_RETURN_URL:http://localhost:8080/api/payments/vnpay/return}
washmate.payment.vnpay.frontend-result-url=${VNPAY_FRONTEND_RESULT_URL:http://localhost:3000/payment/vnpay-return}
washmate.payment.vnpay.timeout-minutes=${VNPAY_TIMEOUT_MINUTES:15}
# Fallback settle qua return URL - CHI bat khi test local (mac dinh tat o production)
washmate.payment.vnpay.return-fallback-enabled=${VNPAY_RETURN_FALLBACK_ENABLED:false}

# Rate limit theo IP cho auth endpoints (login/otp/forgot password)
washmate.security.ratelimit.enabled=${AUTH_RATELIMIT_ENABLED:true}
washmate.security.ratelimit.max-requests=${AUTH_RATELIMIT_MAX_REQUESTS:10}
washmate.security.ratelimit.window-seconds=${AUTH_RATELIMIT_WINDOW_SECONDS:60}

# ===============================
# Mail - SMTP
# ===============================
spring.mail.host=${MAIL_HOST:smtp.resend.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:resend}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000

# ===============================
# App Mail Config
# ===============================
app.mail.from=${APP_MAIL_FROM:WashMate <no-reply@autowash.io.vn>}

# ===============================
# Gemini AI Config
# ===============================
gemini.api.key=${GEMINI_API_KEY}
gemini.model=${GEMINI_MODEL:gemini-2.5-flash}
gemini.api.base-url=${GEMINI_API_BASE_URL:https://generativelanguage.googleapis.com/v1beta/models}
gemini.prompt.version=${GEMINI_PROMPT_VERSION:v1}
# Cooldown giua 2 lan regenerate AI enrichment cho cung 1 insight (chong spam quota)
washmate.insight.ai.regenerate-cooldown-seconds=${AI_REGENERATE_COOLDOWN_SECONDS:60}
