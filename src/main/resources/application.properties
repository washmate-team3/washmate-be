spring.application.name=car-wash-management

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/washmate}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

washmate.security.jwt.secret=${JWT_SECRET:change-this-development-secret-change-before-prod-123456789}
washmate.security.jwt.access-token-minutes=${JWT_ACCESS_TOKEN_MINUTES:60}
washmate.security.jwt.refresh-token-days=${JWT_REFRESH_TOKEN_DAYS:7}
washmate.security.otp.mock-code=${OTP_MOCK_CODE:123456}
